      </button>
      <button class="folder-del" onclick="deleteFolder('${esc(f.id)}')"
              title="Delete folder" aria-label="Delete folder ${esc(f.name)}"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;flex-shrink:0"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
    </div>`).join('');
}

function renderContent() {
  renderSidebarFolders();
  updateFolderFilterOptions();

  const searchEl = document.getElementById('search-input');
  const search = searchEl ? searchEl.value.toLowerCase() : '';
  const sec    = st.section;
  let files = [...st.files];
  let title = 'All Files';
  let showFolders = false;

  if      (sec === 'all')    { showFolders = true; }
  else if (sec === 'photos') { files = files.filter(f => f.type === 'photo'); title = 'Photos'; }
  else if (sec === 'videos') { files = files.filter(f => f.type === 'video'); title = 'Videos'; }
  else if (sec === 'docs')   { files = files.filter(f => f.type === 'doc');   title = 'Documents'; }
  else if (sec === 'other')  { files = files.filter(f => f.type === 'other'); title = 'Other Files'; }
  else if (sec.startsWith('folder:')) {
    const fid    = sec.replace('folder:', '');
    const folder = st.folders.find(f => f.id === fid);
    title  = folder ? folder.name : 'Folder';
    files  = files.filter(f => f.folderId === fid);
  }

  const fb = document.getElementById('filter-bar');
  if (fb) fb.style.display = sec === 'notes' ? 'none' : 'flex';

  if (search) {
    files       = files.filter(f =>
      f.name.toLowerCase().includes(search) ||
      (f.comment || '').toLowerCase().includes(search)
    );
    showFolders = false;
  }

  files = applyFilters(files);

  const rl = document.getElementById('results-label');
  if (rl) rl.textContent = `${files.length} result${files.length !== 1 ? 's' : ''}`;

  document.getElementById('page-title').textContent = title;

  // ── NOTES ──
  if (sec === 'notes') {
    document.getElementById('content-area').innerHTML = `
      <button class="new-note-btn" onclick="createNewNote()"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;flex-shrink:0"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> New Note</button>
      <div class="notes-layout">
        <div class="notes-list" id="notes-list" role="list">
          ${st.notes.length === 0
            ? '<div class="notes-empty" style="height:200px"><div class="ei"><svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;flex-shrink:0"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></div><p>No notes yet</p></div>'
            : st.notes.map(n => `
              <div class="note-item ${activeNoteId === n.id ? 'active' : ''}"
                   data-id="${esc(n.id)}" onclick="openNote('${esc(n.id)}')" role="listitem">
                <button class="note-del-btn" onclick="deleteNote('${esc(n.id)}',event)"
                        aria-label="Delete note ${esc(n.title)}"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;flex-shrink:0"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
                <div class="note-item-title">${esc(n.title || 'Untitled')}</div>
                <div class="note-item-preview">${esc((n.body || '').slice(0, 60))}</div>
                <div class="note-item-date">${fmtDate(n.updatedAt)}</div>
              </div>`).join('')}
          <div class="note-count">${st.notes.length} note${st.notes.length !== 1 ? 's' : ''}</div>
        </div>
        <div id="note-editor-area"></div>
      </div>`;
    renderNoteEditor();
    return;
  }

  // ── FILES ──
  const fiv  = showFolders ? st.folders : [];
  let   html = '';

  // FIX #22: Compute stats in ONE pass instead of filtering the array 4 times
  if (sec === 'all' && !search) {
    let photoCount = 0, videoCount = 0;
    for (const f of st.files) {
      if (f.type === 'photo') photoCount++;
      else if (f.type === 'video') videoCount++;
    }
    html += `<div class="stats-bar">
      <div class="stat-card"><div class="sv">${st.files.length}</div><div class="sl">Total Files</div></div>
      <div class="stat-card"><div class="sv">${photoCount}</div><div class="sl">Photos</div></div>
      <div class="stat-card"><div class="sv">${videoCount}</div><div class="sl">Videos</div></div>
      <div class="stat-card"><div class="sv">${st.folders.length}</div><div class="sl">Folders</div></div>
    </div>`;
  }

  if (sec.startsWith('folder:')) {
    const fid    = sec.replace('folder:', '');
    const folder = st.folders.find(f => f.id === fid);
    html += `<div class="breadcrumb">
      <span onclick="navigate('all')"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;flex-shrink:0"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> All Files</span>
      <span class="sep" aria-hidden="true">›</span>
      <span class="cur"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;flex-shrink:0"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg> ${folder ? esc(folder.name) : 'Folder'}</span>
    </div>`;
  }

  html += `
    <div class="upload-zone"
         ondragover="event.preventDefault();this.classList.add('drag-over')"
         ondragleave="this.classList.remove('drag-over')"
         ondrop="handleFileDrop(event)"
         role="button" aria-label="Upload files — drag and drop or click">
      <input type="file" multiple onchange="uploadFiles(this.files)" aria-label="Select files"/>
      <div class="uz-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;flex-shrink:0"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg></div>
      <h3>Upload Files</h3>
      <p>Drag &amp; drop or click — stored in your private GitHub repo</p>
    </div>
    <div class="upload-progress" id="upload-progress-wrap" role="status" aria-live="polite">
      <div class="up-top">
        <span class="up-name" id="up-name-text">Uploading…</span>
        <span class="up-pct"  id="up-pct-text">0%</span>
      </div>
      <div class="up-bar"><div class="up-fill" id="up-fill"></div></div>
    </div>`;

  if (fiv.length > 0) {
    html += `
      <div class="section-header">
        <h2>Folders</h2><span class="badge">${fiv.length}</span>
      </div>
      <div class="items-grid" style="margin-bottom:32px;" role="list">
        ${fiv.map(f => {
          const c = st.files.filter(fi => fi.folderId === f.id).length;
          return `<div class="folder-card" onclick="navigate('folder:${esc(f.id)}')"
                       role="listitem button" aria-label="Folder: ${esc(f.name)}, ${c} items">
            <div class="fi" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;flex-shrink:0"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></div>
            <h4>${esc(f.name)}</h4>
            <p>${c} item${c !== 1 ? 's' : ''}</p>
          </div>`;
        }).join('')}
      </div>`;
  }

  const sectionLabel = sec.startsWith('folder:') ? 'Files in this folder'
                     : sec === 'all'              ? 'All Files'
                     : title;

  html += `<div class="section-header"><h2>${sectionLabel}</h2><span class="badge">${files.length}</span></div>`;

  if (files.length === 0) {
    html += `<div class="empty-state">
      <div class="ei" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;flex-shrink:0"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></div>
      <h3>No files here yet</h3>
      <p>${search ? 'No results match your search.' : 'Upload files using the box above.'}</p>
    </div>`;
  } else {
    html += st.view === 'grid'
      ? `<div class="items-grid" role="list">${files.map(gridCard).join('')}</div>`
      : `<div class="items-list" role="list">${files.map(listItem).join('')}</div>`;
  }

  document.getElementById('content-area').innerHTML = html;
}

function gridCard(f) {
  const th = f.type === 'photo'
    ? `<div class="item-thumb"><img src="${f.url}" alt="${esc(f.name)}" loading="lazy" crossorigin="anonymous"/></div>`
    : `<div class="item-thumb" aria-hidden="true">${icon(f.type, f.name)}</div>`;
  return `
    <div class="item-card" onclick="openItem('${esc(f.id)}')"
         role="listitem button" aria-label="${esc(f.name)}">
      ${th}
      <div class="item-info">
        <div class="item-name">${esc(f.name)}</div>
        ${f.comment ? `<div class="item-comment"><svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;flex-shrink:0"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 0 2 2z"/></svg> ${esc(f.comment)}</div>` : ''}
        <div class="item-meta">${fmtDate(f.createdAt)}${f.size ? ' · ' + fmtSize(f.size) : ''}</div>
      </div>
      <div class="item-actions">
        <button class="action-btn"     onclick="event.stopPropagation();openItem('${esc(f.id)}')"  aria-label="Edit ${esc(f.name)}"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;flex-shrink:0"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button class="action-btn del" onclick="event.stopPropagation();askDelete('${esc(f.id)}')" aria-label="Delete ${esc(f.name)}"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;flex-shrink:0"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
      </div>
    </div>`;
}

function listItem(f) {
  const th = f.type === 'photo'
    ? `<div class="list-thumb"><img src="${f.url}" alt="" loading="lazy" crossorigin="anonymous"/></div>`
    : `<div class="list-thumb" aria-hidden="true">${icon(f.type, f.name)}</div>`;
  return `
    <div class="list-item" onclick="openItem('${esc(f.id)}')"
         role="listitem button" aria-label="${esc(f.name)}">
      ${th}
      <div class="list-info">
        <div class="list-name">${esc(f.name)}</div>
        ${f.comment ? `<div class="list-comment"><svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;flex-shrink:0"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 0 2 2z"/></svg> ${esc(f.comment)}</div>` : ''}
      </div>
      <div class="list-meta">${fmtDate(f.createdAt)}${f.size ? ' · ' + fmtSize(f.size) : ''}</div>
      <div class="list-acts">
        <button class="action-btn"     onclick="event.stopPropagation();openItem('${esc(f.id)}')"  aria-label="Edit"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;flex-shrink:0"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button class="action-btn del" onclick="event.stopPropagation();askDelete('${esc(f.id)}')" aria-label="Delete"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;flex-shrink:0"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
      </div>
    </div>`;
}

// ── MODAL UTILS ──
// openModal/closeModal defined in lamp script (shared scope)
window.closeModalOnBg = function (e, id) {
  if (e.target === document.getElementById(id)) closeModal(id);
};

// ── TOAST ──
let toastTimer = null;
window.toast = function (msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  clearTimeout(toastTimer);
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  t.setAttribute('role', 'status');
  t.setAttribute('aria-live', 'polite');
  document.body.appendChild(t);
  toastTimer = setTimeout(() => t.remove(), 4000);
};
</script>
</body>
</html>
